<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Bolsos</title>

  <!-- Vuetify CSS -->
  <link href="https://cdn.jsdelivr.net/npm/vuetify@3.5.0/dist/vuetify.min.css" rel="stylesheet">

  <!-- Material Icons -->
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #fdfbfb 0%, #f7e8ec 100%);
    }

    .title-bar {
      font-weight: 600;
      letter-spacing: 1px;
    }

    .card-hover {
      transition: all 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    }

    .v-card-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: #6b4c57;
    }

    .whatsapp-btn {
      background: linear-gradient(45deg, #ff9a9e, #fad0c4);
      color: #4a2c2a;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
    }

    .whatsapp-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(45deg, #fbc2eb, #a6c1ee);
    }

    .v-carousel {
      border-radius: 12px;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div id="app"></div>

<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3"></script>

<!-- Vuetify -->
<script src="https://cdn.jsdelivr.net/npm/vuetify@3.5.0/dist/vuetify.min.js"></script>

<!-- App -->
<script src="app.js"></script>

</body>
</html>
